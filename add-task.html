<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow – Add Task</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav>
  <span class="brand">✅ TaskFlow</span>
  <a href="index.html">Dashboard</a>
  <a href="add-task.html">Add Task</a>
  <a href="task-list.html">Task List</a>
  <a href="task-detail.html">Task Detail</a>
  <a href="about.html">About</a>
</nav>

<div class="container">
  <h1>Add New Task</h1>

  <div class="card">
    <form onsubmit="handleSubmit(event)">
      <label for="title">Task Title *</label>
      <input type="text" id="title" placeholder="Enter task title" required />

      <label for="desc">Description</label>
      <textarea id="desc" rows="4" placeholder="Describe the task..."></textarea>

      <label for="due">Due Date *</label>
      <input type="date" id="due" required />

      <label for="priority">Priority *</label>
      <select id="priority" required>
        <option value="">Select priority</option>
        <option value="High">High</option>
        <option value="Medium">Medium</option>
        <option value="Low">Low</option>
      </select>

      <div style="display:flex; gap:12px; flex-wrap:wrap;">
        <button type="submit" class="btn btn-primary">Save Task</button>
        <a href="index.html" class="btn btn-outline">Cancel</a>
      </div>
    </form>

    <div id="msg" style="display:none; margin-top:16px; padding:12px 16px; background:#dcfce7; color:#166534; border-radius:8px; font-weight:600;">
      ✅ Task saved successfully!
    </div>
  </div>
</div>
<div>hiiiiiiiiiiiiiii</div>
<script>
function handleSubmit(e) {
  e.preventDefault();
  document.getElementById('msg').style.display = 'block';
  e.target.reset();
  setTimeout(() => document.getElementById('msg').style.display = 'none', 3000);
}
</script>

</body>
</html>
